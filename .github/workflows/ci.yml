name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test CodeArchaeology.Tests --no-build --configuration Release --verbosity normal

      - name: Publish (self-contained)
        run: >
          dotnet publish CodeArchaeology/CodeArchaeology.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          --output publish/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeArchaeology-win-x64
          path: publish/
          retention-days: 30
